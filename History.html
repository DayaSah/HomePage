<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEPSE Trade History | Dashboard</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --primary: #38bdf8;
            --success: #22c55e;
            --danger: #ef4444;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        h1 { color: var(--primary); margin: 0; }

        /* Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .card h3 { margin: 0 0 10px 0; font-size: 0.9rem; color: #94a3b8; }
        .card p { margin: 0; font-size: 1.5rem; font-weight: bold; }

        /* Tables */
        .table-container {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 40px;
            border: 1px solid var(--border);
        }

        .section-title {
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            margin: 0;
            border-bottom: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.9rem;
        }

        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
        }

        th { background: rgba(0, 0, 0, 0.2); color: var(--primary); }

        .profit { color: var(--success); font-weight: bold; }
        .loss { color: var(--danger); font-weight: bold; }

        .remarks { font-style: italic; color: #94a3b8; font-size: 0.8rem; max-width: 300px; }

        .loading { text-align: center; padding: 50px; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Trade Portfolio History</h1>
        <div id="last-updated"></div>
    </header>

    <div id="summary" class="summary-grid">
        </div>

    <div class="table-container">
        <h2 class="section-title">Realized Trade History</h2>
        <table>
            <thead>
                <tr>
                    <th>Symbol</th>
                    <th>Qty</th>
                    <th>Buy Date</th>
                    <th>Sell Date</th>
                    <th>Buy Rate</th>
                    <th>Sell Rate</th>
                    <th>Net P/L</th>
                    <th>ROI%</th>
                    <th>Remarks</th>
                </tr>
            </thead>
            <tbody id="realized-body">
                <tr><td colspan="9" class="loading">Fetching trade data...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="table-container">
        <h2 class="section-title">Current Holdings (Unrealized)</h2>
        <table>
            <thead>
                <tr>
                    <th>Symbol</th>
                    <th>Qty</th>
                    <th>Buy Date</th>
                    <th>Buy Rate</th>
                    <th>BE</th>
                    <th>Remarks</th>
                </tr>
            </thead>
            <tbody id="unrealized-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    async function fetchTradeHistory() {
        const apiUrl = 'https://nepse-diary-api.onrender.com/api/trade_history';
        
        try {
            const response = await fetch(apiUrl);
            const data = await response.json();
            
            if (data.status === "success") {
                renderSummary(data.summary);
                renderRealized(data.realized_history);
                renderUnrealized(data.unrealized_lots);
                document.getElementById('last-updated').innerText = new Date().toLocaleDateString();
            }
        } catch (error) {
            console.error('Error fetching data:', error);
            document.getElementById('realized-body').innerHTML = `<tr><td colspan="9" style="color:red; text-align:center;">Failed to load data. API might be sleeping.</td></tr>`;
        }
    }

    function renderSummary(summary) {
        const summaryDiv = document.getElementById('summary');
        const plClass = summary.total_realized_pl >= 0 ? 'profit' : 'loss';
        
        summaryDiv.innerHTML = `
            <div class="card"><h3>Total Realized P/L</h3><p class="${plClass}">Rs. ${summary.total_realized_pl.toLocaleString()}</p></div>
            <div class="card"><h3>Win Rate</h3><p style="color: var(--primary)">${summary.win_rate}</p></div>
            <div class="card"><h3>Closed Lots</h3><p>${summary.total_closed_lots}</p></div>
            <div class="card"><h3>Open Lots</h3><p>${summary.total_open_lots}</p></div>
        `;
    }

    function renderRealized(history) {
        const tbody = document.getElementById('realized-body');
        tbody.innerHTML = history.map(trade => `
            <tr>
                <td><strong>${trade.symbol}</strong></td>
                <td>${trade.qty}</td>
                <td>${trade.buy_date}</td>
                <td>${trade.sell_date}</td>
                <td>${trade.buy_rate}</td>
                <td>${trade.sell_rate}</td>
                <td class="${trade.net_pl >= 0 ? 'profit' : 'loss'}">${trade.net_pl}</td>
                <td class="${trade.roi_pct >= 0 ? 'profit' : 'loss'}">${trade.roi_pct}%</td>
                <td class="remarks">${trade.remarks || '-'}</td>
            </tr>
        `).join('');
    }

    function renderUnrealized(lots) {
        const tbody = document.getElementById('unrealized-body');
        tbody.innerHTML = lots.map(lot => `
            <tr>
                <td><strong>${lot.symbol}</strong></td>
                <td>${lot.qty}</td>
                <td>${lot.buy_date}</td>
                <td>${lot.buy_rate}</td>
                <td>${lot.ltp}</td>
                <td class="remarks">${lot.remark || '-'}</td>
            </tr>
        `).join('');
    }

    // Initialize
    fetchTradeHistory();
</script>

</body>
</html>
